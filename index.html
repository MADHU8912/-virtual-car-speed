<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Car Speed Meter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <div class="top-info">
      <div>Outside 32°C</div>
      <div id="time">12:45</div>
    </div>

    <div class="cluster">
      <div class="dial">
        <div class="dial-title">RPM x1000</div>
        <div class="dial-value" id="rpmValue">1.2</div>
        <div class="bar">
          <div class="fill rpm-fill" id="rpmBar"></div>
        </div>
      </div>

      <div class="center-display">
        <div class="car-icon">🚗</div>
        <div class="speed-number" id="speedValue">0</div>
        <div class="speed-unit">km/h</div>
        <div class="gear">Gear: <span id="gearValue">P</span></div>
      </div>

      <div class="dial">
        <div class="dial-title">Fuel / Temp</div>
        <div class="small-readings">
          <p>Fuel: <span id="fuelValue">78</span>%</p>
          <p>Temp: <span id="tempValue">90</span>°C</p>
        </div>
        <div class="bar">
          <div class="fill fuel-fill" id="fuelBar"></div>
        </div>
      </div>
    </div>

    <div class="warning-panel">
      <span class="light active" id="seatbeltLight">SEAT BELT</span>
      <span class="light" id="engineLight">ENGINE</span>
      <span class="light" id="absLight">ABS</span>
      <span class="light" id="doorLight">DOOR</span>
    </div>

    <div class="bottom-info">
      <div>Trip A: 124.6 km</div>
      <div>ODO: 18245 km</div>
      <div>Range: <span id="rangeValue">420</span> km</div>
    </div>

    <div class="controls">
      <button onclick="startCar()">Start</button>
      <button onclick="increaseSpeed()">Speed +</button>
      <button onclick="decreaseSpeed()">Speed -</button>
      <button onclick="brakeCar()">Brake</button>
      <button onclick="stopCar()">Stop</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
