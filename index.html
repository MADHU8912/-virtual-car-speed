<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 180 Degree Car Speed Meter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">

    <h1>3D Real Car Speed Meter</h1>

    <div class="meter-panel">
      <div class="meter-3d">
        <div class="meter-ring"></div>
        <div class="meter-inner"></div>
        <div class="needle-base"></div>
        <div class="needle" id="needle"></div>

        <div class="tick tick-0">0</div>
        <div class="tick tick-20">20</div>
        <div class="tick tick-40">40</div>
        <div class="tick tick-60">60</div>
        <div class="tick tick-80">80</div>
        <div class="tick tick-100">100</div>
        <div class="tick tick-120">120</div>
        <div class="tick tick-140">140</div>
        <div class="tick tick-160">160</div>
        <div class="tick tick-180">180</div>
        <div class="tick tick-200">200</div>
        <div class="tick tick-220">220</div>

        <div class="center-display">
          <div class="speed-value" id="speedValue">0</div>
          <div class="speed-unit">km/h</div>
          <div class="gear-box">Gear: <span id="gearValue">P</span></div>
        </div>
      </div>
    </div>

    <div class="info-panels">
      <div class="card">
        <h3>RPM</h3>
        <div class="value" id="rpmValue">0.8</div>
        <div class="bar-bg">
          <div class="bar-fill rpm-fill" id="rpmBar"></div>
        </div>
      </div>

      <div class="card">
        <h3>Fuel</h3>
        <div class="value"><span id="fuelValue">80</span>%</div>
        <div class="bar-bg">
          <div class="bar-fill fuel-fill" id="fuelBar"></div>
        </div>
      </div>

      <div class="card">
        <h3>Temp</h3>
        <div class="value"><span id="tempValue">90</span>°C</div>
      </div>

      <div class="card">
        <h3>Range</h3>
        <div class="value"><span id="rangeValue">420</span> km</div>
      </div>
    </div>

    <div class="warning-row">
      <span class="light active" id="seatbeltLight">SEAT BELT</span>
      <span class="light" id="engineLight">ENGINE</span>
      <span class="light" id="absLight">ABS</span>
      <span class="light active" id="doorLight">DOOR</span>
    </div>

    <div class="controls">
      <button onclick="startCar()">Start</button>
      <button onclick="increaseSpeed()">Speed +</button>
      <button onclick="decreaseSpeed()">Speed -</button>
      <button onclick="brakeCar()">Brake</button>
      <button onclick="stopCar()">Stop</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
